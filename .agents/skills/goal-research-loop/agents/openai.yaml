interface:
  display_name: "Goal Research Loop"
  short_description: "Run a bounded research loop with contract, ledger, handoff, and explicit decision layers"
  default_prompt: "Given a concrete objective, define a measurable evaluation contract, separate hard gates, experiment status, and control action, and when the user wants a repeatable executable loop prefer the installed runner scripts (`~/.codex/skills/goal-research-loop/scripts/goal-research-loop.sh` or `codex_goal_research_loop.py`) to initialize, inspect, and run the loop with a ledger and state snapshot."
policy:
  allow_implicit_invocation: false

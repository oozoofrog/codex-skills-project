  <text x="396" y="276" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="22" font-weight="500" fill="#CBD5E1">Invoke a second Codex CLI process for isolated read-only analysis, review, suggestions, or carefully scoped full-auto runs only when the user explicitly asks.</text>
  <rect x="396" y="102" width="120" height="36" rx="18" fill="#FDBA74" fill-opacity="0.16"/><text x="414" y="126" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Delegation</text>
  <rect x="396" y="150" width="120" height="36" rx="18" fill="#FDBA74" fill-opacity="0.16"/><text x="414" y="174" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" font-weight="600" fill="white">CLI</text>
  <rect x="396" y="198" width="120" height="36" rx="18" fill="#FDBA74" fill-opacity="0.16"/><text x="414" y="222" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Review</text>
  <rect x="72" y="414" width="1256" height="314" rx="28" fill="white" fill-opacity="0.08"/>
  <text x="112" y="474" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="28" font-weight="700" fill="white">Representative workflows</text>
